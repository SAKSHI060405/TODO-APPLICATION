<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kawaii Todo App</title>
  <link rel="stylesheet" href="INDEX.CSS">
</head>
<body>
  <div class="app-wrapper">
    <div class="todo-container">
      <div class="todo-header">
        <h1>🌸DAILY TASKS🌸</h1>
       
      </div>

    
      <form class="todo-input">
        <input type="text" placeholder="Write a new task...">
        <button type="submit">Add</button>
      </form>

      
      <ul class="todo-list">
        <li>
          <input type="checkbox" id="task1">
          <label for="task1">Draw Zoro's doodle 🎨</label>
        </li>
        <li>
          <input type="checkbox" id="task2">
          <label for="task2">Watch BTS Video 💜</label>
        </li>
        <li>
          <input type="checkbox" id="task3">
          <label for="task3">Eat strawberry mochi 🍓</label>
        <li>
            <input type="checkbox" id="task4">
            <label for="task4">Go for a walk in the park 🌳</label>
        </li>
        <li>
            <input type="checkbox" id="task5">
            <label for="task5">Have a picnic with friends 🧺</label>
        </li>
      </ul>
    </div>
  </div>
</body>
</html>
